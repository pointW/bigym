# Task cost weights
ee_pos_cost: 10000.0
ee_ori_cost: 10000.0
posture_cost_main: 100.0
posture_cost_torso_bias: 50.0
com_over_base_pos_cost: 100.0
base_ground_position_cost: [0.0, 0.0, 100000.0]
base_ground_orientation_cost: [100000.0, 100000.0, 0.0]
torso_upright_ori_cost: 1000.0
torso_upright_target_position: [0.0, 0.0, 1.0]
torso_relative_target: [0.0, 0.0, 0.8]
torso_bias_reference: [0.0, 0.305, -0.698, 0.305, 0.0, 0.0]

# Collision avoidance distances (meters)
safety_distance: 0.01
influence_distance: 0.05

# Velocity limits
velocity_limit_scale: 0.9
base_xy_velocity_limit: 1.0   # m/s
base_rz_velocity_limit: 1.0   # rad/s
joint_velocity_limits:
  torso_0: 2.0944   # 120 deg/s
  torso_1: 2.0944
  torso_2: 3.1416   # 180 deg/s
  torso_3: 3.1416
  torso_4: 3.1416
  torso_5: 3.1416
  left_arm_0: 3.1416
  left_arm_1: 3.1416
  left_arm_2: 3.1416
  left_arm_3: 3.1416
  left_arm_4: 6.2832   # 360 deg/s
  left_arm_5: 6.2832
  left_arm_6: 6.2832
  right_arm_0: 3.1416
  right_arm_1: 3.1416
  right_arm_2: 3.1416
  right_arm_3: 3.1416
  right_arm_4: 6.2832
  right_arm_5: 6.2832
  right_arm_6: 6.2832
use_configuration_limit: false
use_joint_velocity_limit: false
use_base_velocity_limit: false

# Solver settings
dt: 1.0e-3
solver: "daqp"
damping: 1.0e-6
